name: Deploy react app
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Downlaod code on machine
        uses: actions/checkout@v6
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Dependenceis 
        run: npm ci
      - name: Run Tests
        run: npm run test

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
